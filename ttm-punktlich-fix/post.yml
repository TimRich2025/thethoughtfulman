name: post
on:
  workflow_dispatch: {}        # wird vom externen Cron punktgenau ausgeloest
  schedule:
    - cron: "*/5 * * * *"      # nur Fallback, falls der externe Cron mal ausfaellt
permissions:
  contents: write
  issues: write
concurrency:
  group: ttm-post
  cancel-in-progress: false
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: faelliges reel veroeffentlichen
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          LATE_WINDOW_MIN: "45"     # Slot-Toleranz: spaeter wird NICHT gepostet, sondern verpasst
        run: python post.py
      - name: queue-stand speichern
        if: always()
        run: |
          if [ -n "$(git status --porcelain queue.csv)" ]; then
            git config user.name "thethoughtfulman"
            git config user.email "bot@users.noreply.github.com"
            git add queue.csv
            git commit -m "queue: stand aktualisiert"
            git push
          fi
      - name: ALARM bei Fehlschlag oder verpasstem Slot
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          offen=$(gh issue list --state open --search "POSTER PROBLEM in:title" --json number --jq 'length' 2>/dev/null || echo 0)
          if [ "${offen:-0}" = "0" ]; then
            printf '%s\n\n%s\n' "Ein Lauf hat ein Problem gemeldet: entweder Fehler beim Posten oder ein Slot wurde als verpasst markiert (zu spaet, ueber LATE_WINDOW_MIN)." "Lauf-Log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > /tmp/i.md
            gh issue create --title "POSTER PROBLEM" --body-file /tmp/i.md || true
          fi
